<!DOCTYPE html>
<html>
<head>
    <title>Form Pengajuan</title>
</head>
<body>

    <h2>Form Pengajuan Loan</h2>

    <form method="post">

        <label>Jumlah Tanggungan:</label><br>
        <input type="number" name="no_of_dependents"><br><br>

        <label>Status Pekerjaan:</label><br>
        <select name="self_employed">
            <option value="Yes">Ya</option>
            <option value="No">Tidak</option>
        </select><br><br>

        <label>Penghasilan Tahunan:</label><br>
        <input type="number" name="income_annum"><br><br>

        <label>Jumlah Pinjaman:</label><br>
        <input type="number" name="loan_amount"><br><br>

        <label>Jangka Waktu (bulan):</label><br>
        <input type="number" name="loan_term"><br><br>

        <label>CIBIL Score:</label><br>
        <input type="number" name="cibil_score"><br><br>

        <button type="submit">Submit</button>

    </form>

</body>
</html>
