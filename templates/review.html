<!DOCTYPE html>
<html>
<head>
    <title>Review Analis CBR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Review Kasus Kredit (Revise & Retain)</h2>

    <table class="table table-bordered mt-4">
        <thead class="table-dark">
            <tr>
                <th>ID Pengajuan</th>
                <th>Income</th>
                <th>Loan</th>
                <th>CIBIL</th>
                <th>Keputusan Lama</th>
                <th>Keputusan Baru</th>
                <th>Catatan</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>
const API="http://127.0.0.1:5000";

// 🔥 AUTO LOAD saat halaman dibuka
window.onload = async () => {
    const res = await fetch(`${API}/me`, {credentials:"include"});

    if(res.status !== 200){
        alert("Silakan login dulu!");
        window.location.href="/login-ui";
        return;
    }

    loadData();
};

async function loadData(){
    const res = await fetch(`${API}/review/pending`,{
        credentials:"include"
    });

    const result = await res.json();
    const data = result.data;

    const tbody = document.getElementById("tbody");
    tbody.innerHTML="";

    data.forEach(row=>{
        tbody.innerHTML+=`
        <tr>
            <td>${row.id_pengajuan}</td>
            <td>${row.income_annum}</td>
            <td>${row.loan_amount}</td>
            <td>${row.cibil_score}</td>
            <td><b>${row.keputusan}</b></td>

            <td>
                <select id="k_${row.id_pengajuan}" class="form-select">
                    <option ${row.keputusan=='Approved'?'selected':''}>Approved</option>
                    <option ${row.keputusan=='Rejected'?'selected':''}>Rejected</option>
                </select>
            </td>

            <td>
                <input 
                    id="c_${row.id_pengajuan}" 
                    class="form-control"
                    value="${row.catatan ?? ''}">
            </td>

            <td>
                <button class="btn btn-warning btn-sm" onclick="revise(${row.id_pengajuan})">Revise</button>
                <button class="btn btn-success btn-sm" onclick="retain(${row.id_pengajuan})">Retain</button>
            </td>
        </tr>`;
    });
}

async function revise(id){
    await fetch(`${API}/review/revise/${id}`,{
        method:"PUT",
        credentials:"include",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            keputusan:document.getElementById(`k_${id}`).value,
            catatan:document.getElementById(`c_${id}`).value
        })
    });
    alert("Revisi berhasil");
    loadData();
}

async function retain(id){
    const res=await fetch(`${API}/review/retain/${id}`,{
        method:"POST",
        credentials:"include"
    });
    const data=await res.json();
    alert("Berhasil jadi kasus baru: "+data.loan_id_baru);
    loadData();
}
</script>

</body>
</html>
